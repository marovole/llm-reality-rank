    source_trust: high
    contamination_risk: medium
    recommended_weight: medium_high_for_methodology_medium_for_overall
    update_frequency: periodic
    best_for: 学术公信力、鲁棒性、安全、公平、校准等维度
    use_in: [overall_capability, safety_robustness, methodology]
    ingestion_method: manual_or_scrape
    notes: 更新速度未必最快，但学术权威性强。

