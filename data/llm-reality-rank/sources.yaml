metadata:
  project: LLM Reality Rank
  display_name: 大模型真实使用价值榜
  updated_at: '2026-05-03'
  description: Machine-readable registry of leaderboard and benchmark sources for LLM Reality Rank.
  methodology_doc: docs/llm-reality-rank-scoring-methodology.md
  source_registry_doc: docs/llm-reality-rank-source-registry.md

sources:
  - source_id: lmarena_chatbot_arena
    priority: P0
    name: LMArena / Chatbot Arena Leaderboard
    urls:
      primary: https://lmarena.ai/leaderboard/
      backup: https://huggingface.co/spaces/lmarena-ai/arena-leaderboard
    organization: LMSYS / LMArena
    categories: [general, preference, conversation]
    metric_types: [elo, human_preference, win_rate]
    source_trust: high
    contamination_risk: low_medium
    recommended_weight: high_for_general_medium_for_overall
    update_frequency: frequent
    best_for: 通用对话、人类偏好、回答体验
    use_in: [overall, general_chat, writing_user_experience]
    ingestion_method: manual_or_scrape
    notes: 影响力极高，适合衡量真实用户偏好；偏主观，容易受回答风格影响。

  - source_id: artificial_analysis_llm
    priority: P0
    name: Artificial Analysis LLM Leaderboard / Intelligence Index
    urls:
      primary: https://artificialanalysis.ai/leaderboards/models
    organization: Artificial Analysis
    categories: [general, cost_speed, api, practical]
    metric_types: [intelligence_index, price, latency, speed, context]
    source_trust: high
    contamination_risk: low_medium
    recommended_weight: high_for_practicality_medium_high_for_overall
    update_frequency: frequent
    best_for: API 选型、价格、速度、上下文、综合实用指标
    use_in: [overall, value_for_money, api_models, speed, cost_efficiency]
    ingestion_method: manual_or_scrape
    notes: Reality Value Index 的 Practicality Multiplier 核心来源。

  - source_id: livebench
    priority: P0
    name: LiveBench
    urls:
      primary: https://livebench.ai/
    organization: LiveBench team
    categories: [general, reasoning, math, coding, anti_contamination]
    metric_types: [benchmark_score, task_accuracy]
    source_trust: high
    contamination_risk: low
    recommended_weight: high
    update_frequency: frequent
    best_for: 动态、抗污染的综合能力评估
    use_in: [overall_capability, reasoning, math, coding_reference]
    ingestion_method: manual_or_scrape
    notes: 动态更新有助于降低 benchmark contamination。

  - source_id: opencompass_llm
    priority: P0
    name: OpenCompass LLM Leaderboard
    urls:
      primary: https://rank.opencompass.org.cn/leaderboard-llm-v2
      backup: https://opencompass.org.cn/leaderboard-llm
    organization: OpenCompass / Shanghai AI Lab ecosystem
    categories: [general, chinese, reasoning, coding, open_models]
    metric_types: [benchmark_aggregate, task_score]
    source_trust: high
    contamination_risk: medium
    recommended_weight: high_for_chinese_general_medium_high_for_overall
    update_frequency: frequent
    best_for: 中英综合能力、中国模型覆盖、开源模型评测
    use_in: [overall, chinese, open_weight, china_models]
    ingestion_method: manual_or_scrape
    notes: 对中文和中国模型覆盖优于许多英文榜单。

  - source_id: hf_open_llm_leaderboard
    priority: P0
    name: Hugging Face Open LLM Leaderboard
    urls:
      primary: https://huggingface.co/spaces/open-llm-leaderboard/open_llm_leaderboard
    organization: Hugging Face
    categories: [open_models, general]
    metric_types: [benchmark_aggregate]
    source_trust: high
    contamination_risk: medium_high
    recommended_weight: medium_for_open_models_low_medium_for_overall
    update_frequency: frequent
    best_for: 开放权重模型横向比较
    use_in: [open_weight, local_deployment, small_models]
    ingestion_method: hf_space_or_manual
    notes: 适合作为开源模型来源之一，不应单独决定总分。

  - source_id: stanford_helm
